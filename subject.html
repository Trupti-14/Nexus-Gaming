<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS – Learn & Play</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#ff006e; --blue:#00f5ff; --purple:#8338ec;
  --yellow:#ffbe0b; --green:#06ffa5; --orange:#ff8c00;
  --bg:#050714; --card:#0d1128; --card2:#111830;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Rajdhani',sans-serif; background:var(--bg); color:#fff; min-height:100vh; }

/* ── Background ── */
.bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse at 15% 20%, rgba(131,56,236,0.18) 0%, transparent 45%),
              radial-gradient(ellipse at 85% 80%, rgba(255,0,110,0.14) 0%, transparent 45%),
              radial-gradient(ellipse at 50% 50%, rgba(0,245,255,0.07) 0%, transparent 60%),
              #050714; }
.grid-lines { position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
  background-size:55px 55px; animation:gridScroll 25s linear infinite; }
@keyframes gridScroll { to { transform:translateY(55px); } }

/* ── Layout ── */
.shell { position:relative; z-index:10; display:flex; flex-direction:column; min-height:100vh; }

/* ── Topbar ── */
.topbar {
  display:flex; align-items:center; gap:16px;
  padding:14px 28px; margin:16px;
  background:rgba(13,17,40,0.85); border:1px solid rgba(0,245,255,0.2);
  border-radius:14px; backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.back-btn {
  padding:8px 18px; background:transparent;
  border:2px solid var(--blue); border-radius:8px;
  color:var(--blue); font-family:'Orbitron',sans-serif;
  font-size:0.78rem; font-weight:700; cursor:pointer;
  text-decoration:none; transition:all 0.25s; white-space:nowrap;
}
.back-btn:hover { background:var(--blue); color:#000; }
.topbar-title { font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:900;
  background:linear-gradient(90deg,var(--blue),var(--pink)); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; }
.context-chips { display:flex; gap:8px; flex-wrap:wrap; margin-left:auto; }
.chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 12px; border-radius:16px; font-size:0.72rem;
  font-family:'Orbitron',sans-serif; letter-spacing:0.5px; white-space:nowrap;
}
.chip-board { background:rgba(255,0,110,0.1); border:1px solid rgba(255,0,110,0.35); color:var(--pink); }
.chip-std { background:rgba(131,56,236,0.1); border:1px solid rgba(131,56,236,0.4); color:#c084fc; }
.chip-stream { background:rgba(6,255,165,0.08); border:1px solid rgba(6,255,165,0.35); color:var(--green); }
.chip-exam { background:rgba(255,190,11,0.1); border:1px solid rgba(255,190,11,0.4); color:var(--yellow); }

/* ── Main body ── */
.body-wrap { display:flex; gap:0; flex:1; padding:0 16px 16px; }

/* ── Subject sidebar ── */
.subject-sidebar {
  width:200px; flex-shrink:0;
  background:rgba(13,17,40,0.75); border:1px solid rgba(0,245,255,0.15);
  border-radius:14px; padding:14px 0;
  overflow-y:auto; max-height:calc(100vh - 140px);
  position:sticky; top:16px; backdrop-filter:blur(8px);
  margin-right:16px;
}
.sidebar-label { font-family:'Orbitron',sans-serif; font-size:0.6rem; color:rgba(0,245,255,0.5);
  letter-spacing:1.5px; text-transform:uppercase; padding:8px 16px 6px; }
.sub-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; cursor:pointer; transition:all 0.2s;
  border-left:3px solid transparent; font-size:0.92rem;
  color:rgba(255,255,255,0.6);
}
.sub-item:hover { background:rgba(0,245,255,0.07); color:rgba(255,255,255,0.9); }
.sub-item.active { background:rgba(0,245,255,0.1); border-left-color:var(--blue); color:#fff; }
.sub-item .sub-icon { font-size:1.2rem; flex-shrink:0; }
.sub-item .sub-name { font-family:'Orbitron',sans-serif; font-size:0.68rem; letter-spacing:0.5px; }

/* ── Right content ── */
.content-panel { flex:1; min-width:0; }

/* ── No-profile banner ── */
.setup-banner {
  background:rgba(255,190,11,0.08); border:1px solid rgba(255,190,11,0.35);
  border-radius:12px; padding:14px 20px; margin-bottom:16px;
  display:flex; align-items:center; gap:12px; font-size:0.88rem; color:var(--yellow);
}
.setup-banner a { color:var(--yellow); font-weight:700; text-decoration:underline; }

/* ── Subject header ── */
.subject-header {
  background:linear-gradient(135deg,rgba(13,17,40,0.9),rgba(17,24,56,0.9));
  border:1px solid rgba(0,245,255,0.2); border-radius:14px;
  padding:22px 28px; margin-bottom:18px;
  display:flex; align-items:center; gap:20px;
  box-shadow:0 0 30px rgba(0,245,255,0.08);
}
.subject-hero-icon { font-size:3.5rem; filter:drop-shadow(0 0 14px rgba(0,245,255,0.5)); }
.subject-hero-info { flex:1; }
.subject-hero-name { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900;
  color:var(--blue); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
.subject-hero-sub { font-size:0.9rem; color:rgba(255,255,255,0.55); }
.subject-hero-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.htag { padding:3px 11px; border-radius:12px; font-size:0.7rem; font-family:'Orbitron',sans-serif; }
.htag-vis { background:rgba(0,245,255,0.1); border:1px solid rgba(0,245,255,0.3); color:var(--blue); }
.htag-game { background:rgba(255,0,110,0.1); border:1px solid rgba(255,0,110,0.3); color:var(--pink); }
.htag-concept { background:rgba(131,56,236,0.1); border:1px solid rgba(131,56,236,0.35); color:#c084fc; }

/* ── Section tabs ── */
.section-tabs { display:flex; gap:8px; margin-bottom:18px; }
.sec-tab {
  padding:9px 20px; border-radius:22px; cursor:pointer;
  border:2px solid rgba(0,245,255,0.18); font-family:'Orbitron',sans-serif;
  font-size:0.72rem; color:rgba(255,255,255,0.55); transition:all 0.25s;
  display:flex; align-items:center; gap:7px;
}
.sec-tab:hover { border-color:var(--blue); color:var(--blue); }
.sec-tab.active { background:rgba(0,245,255,0.1); border-color:var(--blue); color:var(--blue); box-shadow:0 0 14px rgba(0,245,255,0.2); }
.sec-tab .tab-count { background:rgba(0,245,255,0.2); border-radius:10px; padding:1px 7px; font-size:0.65rem; }

/* ── Cards grid ── */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }

/* ── Concept Visualisation Card ── */
.vis-card {
  background:var(--card2); border:1px solid rgba(0,245,255,0.2);
  border-radius:14px; overflow:hidden; cursor:pointer;
  transition:all 0.35s; position:relative;
}
.vis-card:hover { transform:translateY(-6px); box-shadow:0 0 34px rgba(0,245,255,0.3); border-color:var(--blue); }
.vis-card:hover .vis-preview { transform:scale(1.04); }

.vis-preview {
  height:160px; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; transition:transform 0.4s;
}
/* Different color themes per card */
.vis-card[data-theme="physics"] .vis-preview { background:linear-gradient(135deg,#0a1628,#1a2040); }
.vis-card[data-theme="chemistry"] .vis-preview { background:linear-gradient(135deg,#0d1a0d,#1a2d1a); }
.vis-card[data-theme="maths"] .vis-preview { background:linear-gradient(135deg,#1a0a28,#2d1a40); }
.vis-card[data-theme="biology"] .vis-preview { background:linear-gradient(135deg,#1a0a0a,#2d1a0a); }
.vis-card[data-theme="history"] .vis-preview { background:linear-gradient(135deg,#1a150a,#2d240a); }
.vis-card[data-theme="geography"] .vis-preview { background:linear-gradient(135deg,#0a1a15,#0a2d20); }
.vis-card[data-theme="economics"] .vis-preview { background:linear-gradient(135deg,#0a0d1a,#0a151a); }
.vis-card[data-theme="cs"] .vis-preview { background:linear-gradient(135deg,#0a0d1a,#15102a); }
.vis-card[data-theme="general"] .vis-preview { background:linear-gradient(135deg,#0d1128,#151a30); }

.vis-emoji { font-size:4rem; filter:drop-shadow(0 0 18px rgba(255,255,255,0.3)); z-index:2; }
.vis-anim-bg { position:absolute; inset:0; z-index:1; }

/* Animated orbit rings for physics */
.orbit-ring { position:absolute; border:1px solid rgba(0,245,255,0.3); border-radius:50%; animation:spin 4s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Wave for chemistry */
.wave-line { position:absolute; width:200%; height:2px; background:linear-gradient(90deg,transparent,var(--green),transparent); animation:wave 2s ease-in-out infinite; }
@keyframes wave { 0%,100% { top:50%; } 50% { top:45%; } }

/* Grid for maths */
.math-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(131,56,236,0.15) 1px,transparent 1px), linear-gradient(90deg,rgba(131,56,236,0.15) 1px,transparent 1px); background-size:20px 20px; }

/* DNA helix for biology */
.dna-dot { position:absolute; width:8px; height:8px; border-radius:50%; animation:dnaFloat 3s ease-in-out infinite; }
@keyframes dnaFloat { 0%,100% { transform:translateX(0) scale(1); } 50% { transform:translateX(20px) scale(1.3); } }

/* Floating particles */
.fp { position:absolute; border-radius:50%; animation:fpFloat 3s ease-in-out infinite; }
@keyframes fpFloat { 0%,100% { transform:translateY(0) scale(1); opacity:0.6; } 50% { transform:translateY(-10px) scale(1.2); opacity:1; } }

.vis-card-body { padding:16px 18px; }
.vis-type-tag {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:10px; font-size:0.65rem;
  font-family:'Orbitron',sans-serif; margin-bottom:8px;
}
.tag-visual { background:rgba(0,245,255,0.12); border:1px solid rgba(0,245,255,0.3); color:var(--blue); }
.tag-concept { background:rgba(131,56,236,0.12); border:1px solid rgba(131,56,236,0.3); color:#c084fc; }
.tag-game { background:rgba(255,0,110,0.12); border:1px solid rgba(255,0,110,0.3); color:var(--pink); }
.tag-practice { background:rgba(255,190,11,0.12); border:1px solid rgba(255,190,11,0.3); color:var(--yellow); }
.tag-jee { background:rgba(255,190,11,0.15); border:1px solid rgba(255,190,11,0.5); color:var(--yellow); }
.tag-neet { background:rgba(6,255,165,0.12); border:1px solid rgba(6,255,165,0.4); color:var(--green); }

.vis-title { font-family:'Orbitron',sans-serif; font-size:0.9rem; color:#fff; margin-bottom:5px; letter-spacing:0.5px; }
.vis-desc { font-size:0.82rem; color:rgba(255,255,255,0.5); line-height:1.45; }
.vis-meta { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
.vis-level { font-size:0.72rem; padding:3px 10px; border-radius:10px; }
.level-6-8 { background:rgba(6,255,165,0.12); color:var(--green); border:1px solid rgba(6,255,165,0.3); }
.level-9-10 { background:rgba(255,190,11,0.12); color:var(--yellow); border:1px solid rgba(255,190,11,0.3); }
.level-11-12 { background:rgba(255,0,110,0.12); color:var(--pink); border:1px solid rgba(255,0,110,0.3); }
.level-jee { background:rgba(255,140,0,0.15); color:var(--orange); border:1px solid rgba(255,140,0,0.4); }
.level-neet { background:rgba(6,255,165,0.12); color:var(--green); border:1px solid rgba(6,255,165,0.4); }
.vis-duration { font-size:0.7rem; color:rgba(255,255,255,0.35); }

.play-overlay {
  position:absolute; top:10px; right:10px;
  background:rgba(0,245,255,0.2); border:1px solid rgba(0,245,255,0.4);
  border-radius:50%; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.9rem; transition:all 0.25s; opacity:0;
}
.vis-card:hover .play-overlay { opacity:1; transform:scale(1.1); background:rgba(0,245,255,0.35); }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.3); }
.empty-state .big-emoji { font-size:3rem; margin-bottom:14px; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,245,255,0.3); border-radius:4px; }

@media(max-width:900px){
  .body-wrap { flex-direction:column; }
  .subject-sidebar { width:100%; max-height:none; position:static; display:flex; flex-wrap:wrap; gap:4px; padding:10px; margin-right:0; margin-bottom:14px; }
  .sub-item { border-left:none; border-radius:8px; border:1px solid rgba(0,245,255,0.2); padding:7px 12px; }
  .sub-item.active { border-color:var(--blue); }
  .sidebar-label { display:none; }
  .context-chips { display:none; }
  .cards-grid { grid-template-columns:1fr; }
}
</style>
</head>

const user = JSON.parse(localStorage.getItem('currentUser'));
if (!user) window.location.href = 'login.html';

const std = user.standard || '';
const board = user.board || '';
const stream = user.stream || '';
const sciSub = user.scienceSub || '';

function getKey() { return getSubjectKey(std, stream, sciSub); }
function getSubjectKey(s, str, sci) {
  const n = parseInt(s);
  if (!s || n < 11) return s;
  if (!str) return null;
  if (str === 'Science') return `${s}_Science_${sci || 'PCM'}`;
  return `${s}_${str}`;
}

function getUserSubjects() {
  if (!board || !std) return null;
  const cat = CATALOGUE[board] || CATALOGUE.CBSE;
  const key = getKey();
  if (!key) return null;
  return cat[key] || null;
}

const userSubjects = getUserSubjects();

// STRICT: only show user's actual subjects. If profile incomplete → redirect back.
if (!userSubjects || !userSubjects.length) {
  // Show banner and empty sidebar — do NOT fall back to all subjects
}

const displaySubjects = userSubjects || [];

// URL param — pick subject from URL or first in user's list
const params = new URLSearchParams(location.search);
let activeSubject = params.get('subject') || (displaySubjects.length ? displaySubjects[0] : '');
// If the URL subject isn't in this user's list, default to first
if (activeSubject && !displaySubjects.includes(activeSubject)) activeSubject = displaySubjects[0] || '';

let activeSection = 'all';

// ── Context chips ──
function buildContext() {
  const el = document.getElementById('contextChips');
  if (!board || !std) {
    document.getElementById('setupBanner').style.display = 'flex';
    return;
  }
  let h = `<span class="chip chip-board">📋 ${board}${user.stateBoard?' – '+user.stateBoard:''}</span>`;
  h += `<span class="chip chip-std">📚 Class ${std}</span>`;
  if (stream) {
    const si = stream==='Science'?'🔬':stream==='Commerce'?'📊':'🎨';
    h += `<span class="chip chip-stream">${si} ${stream}${sciSub?' · '+sciSub.replace('_',' '):''}</span>`;
  }
  el.innerHTML = h;
}

// ── Sidebar ──
function buildSidebar() {
  const el = document.getElementById('sidebarItems');

  if (!displaySubjects.length) {
    el.innerHTML = `<div style="padding:16px 12px;color:rgba(255,255,255,0.35);font-size:0.78rem;line-height:1.6;text-align:center;"><div style="font-size:1.6rem;margin-bottom:8px;">🎓</div>Complete your academic profile to see your subjects.<br><br><a href="profile.html" style="color:var(--blue);text-decoration:underline;font-size:0.72rem;">Set Board & Class →</a></div>`;
    return;
  }

  el.innerHTML = displaySubjects.map(s => {
    const m = SUBJECT_META[s] || { icon:'📚' };
    return `<div class="sub-item ${s===activeSubject?'active':''}" onclick="switchSubject('${s}')">
      <span class="sub-icon">${m.icon}</span>
      <span class="sub-name">${s}</span>
    </div>`;
  }).join('');
}

// ── Subject header ──
function buildHeader() {
  const m = SUBJECT_META[activeSubject] || { icon:'📚', theme:'general', color:'#fff' };
  const n = parseInt(std);
  let tagHtml = '';
  if (n >= 6 && n <= 8) tagHtml += '<span class="htag htag-concept">Class 6–8</span>';
  if (n >= 9 && n <= 10) tagHtml += '<span class="htag htag-concept">Class 9–10</span>';
  if (n >= 11) tagHtml += '<span class="htag htag-concept">Class 11–12</span>';
  if (sciSub==='PCM'||sciSub==='PCMB'||sciSub==='PCM_CS') tagHtml += '<span class="htag htag-game">JEE Prep</span>';
  if (sciSub==='PCB'||sciSub==='PCMB') tagHtml += '<span class="htag htag-vis">NEET Prep</span>';
  tagHtml += '<span class="htag htag-vis">Visual Learning</span>';
  tagHtml += '<span class="htag htag-concept">Concept First</span>';

  const content = getFilteredContent();
  const visCnt = content.filter(c=>c.type==='visual'||c.type==='concept').length;
  const gameCnt = content.filter(c=>c.type==='game'||c.type==='practice').length;

  document.getElementById('subjectHeader').innerHTML = `
    <div class="subject-hero-icon">${m.icon}</div>
    <div class="subject-hero-info">
      <div class="subject-hero-name">${activeSubject}</div>
      <div class="subject-hero-sub">${visCnt} visual concepts · ${gameCnt} games & practice · ${board||'All boards'}</div>
      <div class="subject-hero-tags">${tagHtml}</div>
    </div>`;
}

// ── Section tabs ──
function buildTabs() {
  const all = getFilteredContent();
  const counts = {
    all: all.length,
    visual: all.filter(c=>c.type==='visual'||c.type==='concept').length,
    game: all.filter(c=>c.type==='game'||c.type==='practice').length,
  };
  const tabs = [
    { key:'all', label:'All', icon:'✨' },
    { key:'visual', label:'Visualise & Learn', icon:'🎬' },
    { key:'game', label:'Practice & Play', icon:'🎮' },
  ];
  document.getElementById('sectionTabs').innerHTML = tabs.map(t =>
    `<div class="sec-tab ${activeSection===t.key?'active':''}" onclick="switchSection('${t.key}')">
      ${t.icon} ${t.label}
      <span class="tab-count">${counts[t.key]}</span>
    </div>`
  ).join('');
}

// ── Filter content by subject, level, sciSub, section ──
function getFilteredContent() {
  const raw = CONTENT[activeSubject] || [];
  const n = parseInt(std) || 8;
  return raw.filter(item => {
    // Level filter
    const levelOk = (() => {
      if (item.level==='6-8')  return n>=6 && n<=8;
      if (item.level==='9-10') return n>=9 && n<=10;
      if (item.level==='11-12') return n>=11;
      if (item.level==='jee')  return n>=11 && (sciSub==='PCM'||sciSub==='PCMB'||sciSub==='PCM_CS');
      if (item.level==='neet') return n>=11 && (sciSub==='PCB'||sciSub==='PCMB');
      return true;
    })();
    if (!levelOk) return false;
    // SciSub filter
    if (item.forSciSub && sciSub && !item.forSciSub.includes(sciSub)) return false;
    // Section filter
    if (activeSection==='visual') return item.type==='visual'||item.type==='concept';
    if (activeSection==='game')   return item.type==='game'||item.type==='practice';
    return true;
  });
}

  const grid = document.getElementById('cardsGrid');

    grid.innerHTML = `<div class="empty-state"><div class="big-emoji">🔭</div>Content for this section is coming soon!<br>Check other tabs or switch subjects.</div>`;
    return;
  }

  grid.innerHTML = items.map(item => {
    const typeTag = { visual:'🎬 Visual', concept:'💡 Concept', game:'🎮 Game', practice:'📝 Practice' }[item.type];
    const tagCls = { visual:'tag-visual', concept:'tag-concept', game:'tag-game', practice:'tag-practice' }[item.type];
    const levelLabel = { 'jee':'JEE Level', 'neet':'NEET Level', '6-8':'Class 6–8', '9-10':'Class 9–10', '11-12':'Class 11–12' }[item.level];
    const levelCls = { 'jee':'level-jee', 'neet':'level-neet', '6-8':'level-6-8', '9-10':'level-9-10', '11-12':'level-11-12' }[item.level];

    // Build animated preview background
    let animBg = '';
    if (m.theme==='physics') {
      animBg = `<div class="vis-anim-bg">
        <div class="orbit-ring" style="width:80px;height:80px;left:calc(50% - 40px);top:calc(50% - 40px);animation-duration:3s;border-color:rgba(0,245,255,0.4)"></div>
        <div class="orbit-ring" style="width:120px;height:120px;left:calc(50% - 60px);top:calc(50% - 60px);animation-duration:5s;animation-direction:reverse;border-color:rgba(0,245,255,0.2)"></div>
        <div class="fp" style="width:12px;height:12px;background:rgba(0,245,255,0.6);left:45%;top:40%;animation-duration:2s;"></div>
        <div class="fp" style="width:8px;height:8px;background:rgba(131,56,236,0.7);left:55%;top:55%;animation-duration:2.8s;animation-delay:0.5s;"></div>
      </div>`;
    } else if (m.theme==='chemistry') {
      animBg = `<div class="vis-anim-bg">
        <div class="wave-line" style="top:40%;background:linear-gradient(90deg,transparent,rgba(6,255,165,0.6),transparent);animation-duration:2.2s;"></div>
        <div class="wave-line" style="top:60%;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.4),transparent);animation-duration:2.8s;animation-direction:reverse;"></div>
        <div class="fp" style="width:14px;height:14px;background:rgba(6,255,165,0.5);left:30%;top:50%;border-radius:50%;animation-duration:2.5s;"></div>
        <div class="fp" style="width:10px;height:10px;background:rgba(255,0,110,0.6);left:65%;top:45%;border-radius:50%;animation-duration:3s;animation-delay:0.7s;"></div>
      </div>`;
    } else if (m.theme==='maths') {
      animBg = `<div class="vis-anim-bg">
        <div class="math-grid"></div>
        <div class="fp" style="width:6px;height:6px;background:rgba(131,56,236,0.8);left:30%;top:35%;animation-duration:2s;"></div>
        <div class="fp" style="width:6px;height:6px;background:rgba(0,245,255,0.8);left:60%;top:55%;animation-duration:2.6s;animation-delay:0.4s;"></div>
        <div class="fp" style="width:6px;height:6px;background:rgba(255,190,11,0.8);left:50%;top:40%;animation-duration:3s;animation-delay:0.9s;"></div>
      </div>`;
    } else if (m.theme==='biology') {
      animBg = `<div class="vis-anim-bg">
        <div class="dna-dot" style="background:rgba(255,140,0,0.7);left:25%;top:40%;animation-duration:2.5s;width:10px;height:10px;"></div>
        <div class="dna-dot" style="background:rgba(6,255,165,0.7);left:55%;top:55%;animation-duration:2s;animation-delay:0.5s;width:8px;height:8px;"></div>
        <div class="dna-dot" style="background:rgba(255,0,110,0.5);left:70%;top:35%;animation-duration:3s;animation-delay:1s;width:12px;height:12px;"></div>
      </div>`;
    } else {
      animBg = `<div class="vis-anim-bg">
        <div class="fp" style="width:8px;height:8px;background:rgba(0,245,255,0.5);left:35%;top:40%;animation-duration:2.5s;"></div>
        <div class="fp" style="width:6px;height:6px;background:rgba(131,56,236,0.6);left:60%;top:55%;animation-duration:3s;animation-delay:0.6s;"></div>
      </div>`;
    }

    return `<div class="vis-card" data-theme="${m.theme}" onclick="launchContent('${item.title.replace(/'/g,"\\'")}','${item.type}')">
      <div class="vis-preview">
        ${animBg}
        <div class="vis-emoji">${item.emoji}</div>
        <div class="play-overlay">▶</div>
      </div>
      <div class="vis-card-body">
        <div class="vis-type-tag ${tagCls}">${typeTag}</div>
        ${item.level==='jee'?'<span class="vis-type-tag tag-jee" style="margin-left:5px;">JEE</span>':item.level==='neet'?'<span class="vis-type-tag tag-neet" style="margin-left:5px;">NEET</span>':''}
        <div class="vis-title">${item.title}</div>
        <div class="vis-desc">${item.desc}</div>
        <div class="vis-meta">
          <span class="vis-level ${levelCls}">${levelLabel}</span>
          <span class="vis-duration">⏱ ${item.mins} min</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchSubject(s) {
  activeSubject = s;
  activeSection = 'all';
  document.querySelectorAll('.sub-item').forEach(el => el.classList.toggle('active', el.textContent.trim()===s));
  buildHeader(); buildTabs(); renderCards();
  // Update URL without reload
  history.replaceState(null,'',`?subject=${encodeURIComponent(s)}`);
}

function switchSection(s) {
  activeSection = s;
  buildTabs(); renderCards();
}

function launchContent(title, type) {
  // Store context for the game/visual page
  sessionStorage.setItem('nexusContent', JSON.stringify({ subject: activeSubject, title, type, std, board, stream, sciSub }));
  const typeRoutes = { visual:'visual-player.html', concept:'concept-player.html', game:'game-player.html', practice:'practice-player.html' };
  const url = (typeRoutes[type]||'visual-player.html') + `?title=${encodeURIComponent(title)}`;
  window.location.href = url;
}

// ── Init ──
buildContext();
buildSidebar();
buildHeader();
buildTabs();
renderCards();
</script>
</body>
</html>
