<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Feedback | Nexus Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="english-feedback.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <div class="feedback-wrap">
    <div class="feedback-card">
      <div class="top-badge">English Quiz Feedback</div>

      <h1>Great Try, Champion! 🌟</h1>
      <p class="subtext">Here is your quiz result and performance feedback.</p>

      <div class="score-box">
        <h2 id="scoreText">4 / 5</h2>
        <span id="percentageText">80%</span>
      </div>

      <div class="stars" id="starsBox">⭐⭐⭐⭐</div>

      <div class="review-box" id="reviewBox">
        Excellent work! Your English understanding is strong.
      </div>

      <div class="actions">
        <a href="english-quiz.html" class="outline-btn">🔁 Retry Quiz</a>
        <a href="chapter-detail.html" class="primary-btn">📚 Next Topic</a>
      </div>
    </div>
  </div>

  <script src="english-feedback.js"></script>
</body>
</html>
