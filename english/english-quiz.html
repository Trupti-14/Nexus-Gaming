<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Quiz | Nexus Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="english-quiz.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo-box">
        <h1>Nexus Arena</h1>
        <p>Student Panel</p>
      </div>

      <nav class="sidebar-menu">
        <a href="../../dashboard/dashboard.html" class="menu-item">🏠 Dashboard</a>
        <a href="../../profile/profile.html" class="menu-item">👤 Profile</a>
        <a href="../../awareness/awareness.html" class="menu-item">🛡️ Awareness Module</a>
        <a href="../subjects/subjects.html" class="menu-item active">📘 Education Module</a>
        <a href="../../achievements/achievements.html" class="menu-item">🏆 Achievements</a>
        <a href="../../leaderboard/leaderboard.html" class="menu-item">📊 Leaderboard</a>
        <a href="../../notifications/notifications.html" class="menu-item">🔔 Notifications</a>
        <a href="../../settings/settings.html" class="menu-item">⚙️ Settings</a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="hero card">
        <h2>ENGLISH QUIZ</h2>
        <p>Answer all questions and submit to see your feedback.</p>
      </section>

      <section class="quiz-card card">
        <div class="quiz-top">
          <h3 id="questionNumber">Question 1 of 5</h3>
          <span class="timer-pill">⏱ 05:00</span>
        </div>

        <h4 id="questionText">Which word matches the picture of an apple?</h4>

        <div class="option-list" id="optionList"></div>

        <div class="quiz-actions">
          <button class="outline-btn" id="prevBtn">⬅ Previous</button>
          <button class="primary-btn" id="nextBtn">Next ➡</button>
          <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        </div>
      </section>
    </main>
  </div>

  <script src="english-quiz.js"></script>
</body>
</html>
