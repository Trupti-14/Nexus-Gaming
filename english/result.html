<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Arena | Quiz Result</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="result.css">

</head>

<body>

<div class="result-container">

    <div class="result-card">

        <h1>Quiz Result</h1>

        <div class="score-box">

            <h2 id="scoreText">0 / 5</h2>
            <p id="percentageText">0%</p>

        </div>

        <div class="stars" id="stars">⭐⭐⭐</div>

        <p class="feedback" id="feedbackMessage">
            Good effort!
        </p>

        <div class="btn-group">

            <a href="quiz.html" class="btn retry">Retry Quiz</a>

            <a href="chapter-detail.html" class="btn next">Next Topic</a>

        </div>

    </div>

</div>

<script src="result.js"></script>

</body>
